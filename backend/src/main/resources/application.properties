# Server
server.port=8080

# Application
spring.application.name=smart-campus-api

# Database - H2 (default/dev profile)
spring.datasource.url=jdbc:h2:mem:smartcampusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# JWT
app.jwt.secret=smartcampus-very-long-secret-key-for-jwt-that-is-at-least-32-chars
app.jwt.expiration=86400000

# OAuth2 (configure these with real credentials)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Logging
logging.level.com.smartcampus=INFO
logging.level.org.springframework.security=WARN
